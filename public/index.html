<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MatchDay Copilot — Your AI stadium assistant for FIFA World Cup 2026. Get navigation, accessibility, food, transit, and match info in your language.">
  <title>MatchDay Copilot — FIFA World Cup 2026 Stadium Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="header-top">
        <h1>MatchDay Copilot</h1>
        <div class="lang-selector">
          <label for="language-select" class="sr-only">Select language</label>
          <select id="language-select">
            <option value="en">English</option>
            <option value="hi">हिन्दी</option>
            <option value="es">Español</option>
          </select>
        </div>
      </div>
      <p class="subtitle">FIFA World Cup 2026 — Victoria International Stadium</p>
    </header>

    <main>
      <div id="chat-log" class="chat-log" role="log" aria-live="polite" aria-label="Chat messages">
        <!-- Messages will be appended here -->
      </div>

      <div class="quick-actions" role="group" aria-label="Quick action chips">
        <button class="chip" data-message="🧭 Find my gate" type="button">🧭 Find my gate</button>
        <button class="chip" data-message="♿ Accessible routes" type="button">♿ Accessible routes</button>
        <button class="chip" data-message="🍽 Food nearby" type="button">🍽 Food nearby</button>
        <button class="chip" data-message="🚨 Emergency help" type="button">🚨 Emergency help</button>
        <button class="chip" data-message="🚇 Transit after match" type="button">🚇 Transit after match</button>
        <button class="chip" data-message="📅 Today's matches" type="button">📅 Today's matches</button>
      </div>

      <form id="chat-form" class="chat-form" autocomplete="off">
        <label for="message-input" class="sr-only">Type your message</label>
        <input
          type="text"
          id="message-input"
          placeholder="Ask me anything about the stadium..."
          maxlength="500"
          required
        />
        <button type="submit" id="send-button" aria-label="Send message">Send</button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
